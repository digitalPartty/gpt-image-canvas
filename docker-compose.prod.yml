services:
  gpt-image-canvas:
    container_name: gpt-image-canvas
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: node:24.15.0-bookworm-slim
        NPM_CONFIG_REGISTRY: https://registry.npmmirror.com
        APT_MIRROR: http://mirrors.tuna.tsinghua.edu.cn/debian
        APT_SECURITY_MIRROR: http://mirrors.tuna.tsinghua.edu.cn/debian-security
    env_file:
      - path: .env
        required: false
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      DATA_DIR: /app/data
      PROMPT_POOL_DIR: /app/prompt-pool-data
      SQLITE_JOURNAL_MODE: DELETE
      SQLITE_LOCKING_MODE: EXCLUSIVE
      NODE_ENV: production
    volumes:
      - ./data:/app/data
    networks:
      - nginx_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8787/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  nginx_network:
    external: true
